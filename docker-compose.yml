services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-srt}
      POSTGRES_USER: ${POSTGRES_USER:-srt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srt}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    command: ["web"]
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      POSTGRES_DB: ${POSTGRES_DB:-srt}
      POSTGRES_USER: ${POSTGRES_USER:-srt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srt}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RESERVE_RETRY_INTERVAL: ${RESERVE_RETRY_INTERVAL:-5}
      RESERVE_MAX_ATTEMPTS: ${RESERVE_MAX_ATTEMPTS:-2160}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
    command: ["worker"]
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      POSTGRES_DB: ${POSTGRES_DB:-srt}
      POSTGRES_USER: ${POSTGRES_USER:-srt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srt}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RESERVE_RETRY_INTERVAL: ${RESERVE_RETRY_INTERVAL:-5}
      RESERVE_MAX_ATTEMPTS: ${RESERVE_MAX_ATTEMPTS:-2160}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

volumes:
  pgdata:
